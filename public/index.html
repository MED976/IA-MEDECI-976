<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HotNow – Fresh from the oven</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1C1C1E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HotNow" />

    <!-- SEO -->
    <meta name="description" content="Find fresh food right out of the oven near you. Bakeries, pizzerias, pastry shops — updated in real time." />
    <meta property="og:title" content="HotNow – Fresh from the oven" />
    <meta property="og:description" content="Discover bakeries and pizzerias with fresh items right now, near you." />
    <meta property="og:type" content="website" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        background: #F2F1EE;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }
      input:focus, select:focus { outline: none; border-color: #FF5000 !important; box-shadow: 0 0 0 3px rgba(255,80,0,0.08) !important; }
      button:active { opacity: 0.85; transform: scale(0.98); }
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
